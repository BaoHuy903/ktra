<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form nhập dữ liệu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <div class="content">
            <div class="section-title">
                Quản lý phòng
            </div>

            <div class="button-group">
                <button class="btn-show" onclick="showRooms()">Hiển Thị</button>
                <button class="btn-add" onclick="addNewRoom()">
                    <span class="icon">➕</span>
                    Thêm mới phòng
                </button>
            </div>

            <div class="divider"></div>

            <table class="form-table">
                <thead>
                    <tr>
                        <th>Tên phòng</th>
                        <th>Mô tả phòng</th>
                        <th>Giá</th>
                        <th>Chọn hình ảnh</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <input type="text" class="form-input" placeholder="Tên phòng">
                        </td>
                        <td>
                            <input type="text" class="form-input" placeholder="Mô tả phòng">
                        </td>
                        <td>
                            <input type="number" class="form-input" placeholder="Giá phòng">
                        </td>
                        <td>
                            <button class="image-select-btn" onclick="document.getElementById('imageInput').click()">
                                <span class="icon">🖼️</span>
                                Chọn hình ảnh
                            </button>
                            <input type="file" id="imageInput" class="image-input" accept="image/*">
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
