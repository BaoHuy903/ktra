<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danh sách phòng</title>
<link rel="stylesheet" href="indexStyle.css">
</head>

<body>

<div class="container">
    <div class="title">Book đi nào. Mãi bên nhau bạn nhé!</div>
    <div class="subtitle">
        Top nơi ở sang chảnh đón hè đã sẵn sàng. Book đi ngay nè.
    </div>

    <div id="roomList" class="room-grid"></div>
</div>

<script>
const API_URL = 'https://69a7887c2cd1d0552690df12.mockapi.io/api/v1/rooms';

async function renderRooms() {
    const roomList = document.getElementById("roomList");
    roomList.innerHTML = "<p>Đang tải danh sách phòng...</p>";

    try {
        const response = await fetch(API_URL);
        const rooms = await response.json();

        if (!rooms.length) {
            roomList.innerHTML = "<p>Hiện tại chưa có phòng nào trống.</p>";
            return;
        }

        roomList.innerHTML = rooms.map(room => `
            <div class="card">
                <img src="${room.image && room.image.startsWith('http') ? room.image : 'https://via.placeholder.com/400x300'}" onerror="this.src='https://via.placeholder.com/400x300'">
                <div class="heart">❤️</div>
                <div class="card-body">
                    <div>
                        <span class="stars">★★★★★</span>
                        <span class="review">25 Review</span>
                    </div>
                    <div class="card-title">${room.name}</div>
                    <div class="card-desc">${room.description}</div>
                    <div class="price-label">Giá tiền</div>
                    <div class="price">${Number(room.price).toLocaleString('vi-VN')} đ</div>
                    <button class="book-btn">Đặt Ngay ⚡</button>
                </div>
            </div>`).join('');
    } catch (error) {
        roomList.innerHTML = "<p style='color: red;'>Không thể kết nối với máy chủ!</p>";
    }
}

renderRooms();
</script>

</body>
</html>
